name: 发布

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: 创建草稿 Release
        id: create-release
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              return String(data.id);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `debug-comm ${tag}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });

            return String(data.id);

  build:
    name: 构建 ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            args: --bundles nsis

          - name: macOS x64
            os: macos-latest
            args: --bundles dmg

          - name: Linux x64
            os: ubuntu-latest
            args: --bundles deb

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 安装 Linux 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: 设置构建环境
        uses: ./.github/actions/setup-tauri-env

      - name: 校验更新签名密钥
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "缺少 GitHub secret：TAURI_SIGNING_PRIVATE_KEY。这是 Tauri 更新器签名密钥，不是代码签名证书。"
          }

      - name: 构建并上传 Tauri 安装包
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: 发布 GitHub Release
    needs:
      - create-release
      - build
    runs-on: ubuntu-latest
    steps:
      - name: 发布 Release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              draft: false,
              prerelease: false,
            });
