name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              return String(data.id);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `debug-comm ${tag}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });

            return String(data.id);

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            args: --bundles nsis

          - name: macOS x64
            os: macos-latest
            args: --bundles dmg

          - name: Linux x64
            os: ubuntu-latest
            args: --bundles deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY. This is the Tauri updater signing key, not a code-signing certificate."
          }

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish GitHub Release
    needs:
      - create-release
      - build
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              draft: false,
              prerelease: false,
            });

  build-android:
    name: Build Android
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: pnpm tauri android init --ci

      - name: Setup Android signing
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_KEY_BASE64" ]; then
            echo "Missing Android signing secrets." >&2
            exit 1
          fi

          cd src-tauri/gen/android
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "password=$ANDROID_KEY_PASSWORD" >> keystore.properties
          base64 -d <<< "$ANDROID_KEY_BASE64" > "$RUNNER_TEMP/debug-comm-release.jks"
          echo "storeFile=$RUNNER_TEMP/debug-comm-release.jks" >> keystore.properties

      - name: Configure Android release signing
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const file = 'src-tauri/gen/android/app/build.gradle.kts';
          let text = fs.readFileSync(file, 'utf8');

          const imports = [
            'import java.io.FileInputStream',
            'import java.util.Properties',
          ];

          for (const item of imports.reverse()) {
            if (!text.includes(item)) {
              text = `${item}\n${text}`;
            }
          }

          if (!text.includes('create("release")')) {
            const signingConfig = [
              '',
              '    signingConfigs {',
              '        create("release") {',
              '            val keystorePropertiesFile = rootProject.file("keystore.properties")',
              '            val keystoreProperties = Properties()',
              '',
              '            if (keystorePropertiesFile.exists()) {',
              '                keystoreProperties.load(FileInputStream(keystorePropertiesFile))',
              '            }',
              '',
              '            keyAlias = keystoreProperties["keyAlias"] as String',
              '            keyPassword = keystoreProperties["password"] as String',
              '            storeFile = file(keystoreProperties["storeFile"] as String)',
              '            storePassword = keystoreProperties["password"] as String',
              '        }',
              '    }',
            ].join('\n');

            const next = text.replace(/\n\s*buildTypes\s*\{/, `${signingConfig}\n    buildTypes {`);
            if (next === text) {
              throw new Error('Could not find buildTypes block in Android Gradle file');
            }
            text = next;
          }

          if (!text.includes('signingConfig = signingConfigs.getByName("release")')) {
            const next = text.replace(
              /getByName\("release"\)\s*\{/,
              'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
            );
            if (next === text) {
              throw new Error('Could not find release build type in Android Gradle file');
            }
            text = next;
          }

          fs.writeFileSync(file, text);
          NODE

      - name: Build Android bundle
        run: pnpm tauri android build --apk --ci

      - name: Upload Android bundle
        uses: actions/github-script@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const releaseId = Number('${{ needs.create-release.outputs.release_id }}');
            const distDir = path.join(
              process.env.GITHUB_WORKSPACE,
              'src-tauri',
              'gen',
              'android',
              'app',
              'build',
              'outputs',
            );

            const files = [];
            const collect = (dir) => {
              if (!fs.existsSync(dir)) {
                return;
              }

              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const current = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  collect(current);
                  continue;
                }

                if (/\.apk$/.test(entry.name) && !/-unsigned\.apk$/.test(entry.name)) {
                  files.push(current);
                }
              }
            };

            collect(distDir);

            if (files.length === 0) {
              throw new Error(`No Android APK artifacts found under ${distDir}`);
            }

            for (const file of files) {
              const name = `debug-comm_${process.env.GITHUB_REF_NAME}_${path.basename(file)}`;
              const data = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name,
                data,
              });
            }
