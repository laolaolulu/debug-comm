name: 发布

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: 创建草稿 Release
        id: create-release
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              return String(data.id);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `debug-comm ${tag}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });

            return String(data.id);

  build:
    name: 构建 ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            args: --bundles nsis

          - name: macOS x64
            os: macos-latest
            args: --bundles dmg

          - name: Linux x64
            os: ubuntu-latest
            args: --bundles deb

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 安装 Linux 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: 设置构建环境
        uses: ./.github/actions/setup-tauri-env

      - name: 校验更新签名密钥
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "缺少 GitHub secret：TAURI_SIGNING_PRIVATE_KEY。这是 Tauri 更新器签名密钥，不是代码签名证书。"
          }

      - name: 构建并上传 Tauri 安装包
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: 发布 GitHub Release
    needs:
      - create-release
      - build
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: 发布 Release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              draft: false,
              prerelease: false,
            });

  build-android:
    name: 构建 Android
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 设置构建环境
        uses: ./.github/actions/setup-tauri-env
        with:
          rust-targets: aarch64-linux-android

      - name: 配置 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android NDK
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: 初始化 Android 工程
        run: pnpm tauri android init --ci

      - name: 配置 Android 横屏
        run: |
          sed -i '/MainActivity/s/<activity /<activity android:screenOrientation="landscape" /' \
            src-tauri/gen/android/app/src/main/AndroidManifest.xml

      - name: 配置 Android 保留状态栏区域
        run: |
          THEME=$(sed -n 's/.*android:theme="@style\/\([^"]*\)".*/\1/p' \
            src-tauri/gen/android/app/src/main/AndroidManifest.xml | head -1)
          echo "Android 主题名: $THEME"

          STYLES="src-tauri/gen/android/app/src/main/res/values/themes.xml"
          sed -i "s|</style>|    <item name=\"android:statusBarColor\">@android:color/white</item>\n        <item name=\"android:windowLightStatusBar\">true</item>\n    </style>|" "$STYLES"

          mkdir -p src-tauri/gen/android/app/src/main/res/values-v35
          cat > src-tauri/gen/android/app/src/main/res/values-v35/themes.xml << EOF
          <resources>
              <style name="$THEME">
                  <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>
              </style>
          </resources>
          EOF

      - name: 配置 Android 签名
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_KEY_BASE64" ]; then
            echo "缺少 Android 签名 secrets。" >&2
            exit 1
          fi

          cd src-tauri/gen/android
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "password=$ANDROID_KEY_PASSWORD" >> keystore.properties
          base64 -d <<< "$ANDROID_KEY_BASE64" > "$RUNNER_TEMP/debug-comm-release.jks"
          echo "storeFile=$RUNNER_TEMP/debug-comm-release.jks" >> keystore.properties

      - name: 配置 Android Release 签名
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const file = 'src-tauri/gen/android/app/build.gradle.kts';
          let text = fs.readFileSync(file, 'utf8');

          const imports = [
            'import java.io.FileInputStream',
            'import java.util.Properties',
          ];

          for (const item of imports.reverse()) {
            if (!text.includes(item)) {
              text = `${item}\n${text}`;
            }
          }

          if (!text.includes('create("release")')) {
            const signingConfig = [
              '',
              '    signingConfigs {',
              '        create("release") {',
              '            val keystorePropertiesFile = rootProject.file("keystore.properties")',
              '            val keystoreProperties = Properties()',
              '',
              '            if (keystorePropertiesFile.exists()) {',
              '                keystoreProperties.load(FileInputStream(keystorePropertiesFile))',
              '            }',
              '',
              '            keyAlias = keystoreProperties["keyAlias"] as String',
              '            keyPassword = keystoreProperties["password"] as String',
              '            storeFile = file(keystoreProperties["storeFile"] as String)',
              '            storePassword = keystoreProperties["password"] as String',
              '        }',
              '    }',
            ].join('\n');

            const next = text.replace(/\n\s*buildTypes\s*\{/, `${signingConfig}\n    buildTypes {`);
            if (next === text) {
              throw new Error('无法在 Android Gradle 文件中找到 buildTypes 配置块');
            }
            text = next;
          }

          if (!text.includes('signingConfig = signingConfigs.getByName("release")')) {
            const next = text.replace(
              /getByName\("release"\)\s*\{/,
              'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
            );
            if (next === text) {
              throw new Error('无法在 Android Gradle 文件中找到 release build type');
            }
            text = next;
          }

          fs.writeFileSync(file, text);
          NODE

      - name: 配置 Android 更新端点
        run: |
          sed -i 's|releases/latest/download/latest\.json|releases/latest/download/android-latest.json|g' \
            src-tauri/tauri.conf.json

      - name: 构建 Android 安装包
        run: pnpm tauri android build --apk --target aarch64 --ci

      - name: 上传 Android 安装包
        uses: actions/github-script@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const crypto = require('node:crypto');

            const releaseId = Number('${{ needs.create-release.outputs.release_id }}');
            const tag = process.env.GITHUB_REF_NAME;
            const distDir = path.join(
              process.env.GITHUB_WORKSPACE,
              'src-tauri',
              'gen',
              'android',
              'app',
              'build',
              'outputs',
            );

            const files = [];
            const collect = (dir) => {
              if (!fs.existsSync(dir)) {
                return;
              }

              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const current = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  collect(current);
                  continue;
                }

                if (/\.apk$/.test(entry.name) && !/-unsigned\.apk$/.test(entry.name)) {
                  files.push(current);
                }
              }
            };

            collect(distDir);

            if (files.length === 0) {
              throw new Error(`未在 ${distDir} 下找到 Android APK 产物`);
            }

            const uploaded = [];

            for (const file of files) {
              const name = `debug-comm_${tag}_${path.basename(file)}`;
              const data = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name,
                data,
              });
              uploaded.push({ name, file, data });
            }

            const primaryApk = uploaded[0];
            const apkUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${encodeURIComponent(primaryApk.name)}`;
            const manifest = {
              version: tag.replace(/^v/, ''),
              pub_date: new Date().toISOString(),
              notes: `Android ${tag}`,
              platforms: {
                'android-aarch64': {
                  url: apkUrl,
                  sha256: crypto
                    .createHash('sha256')
                    .update(primaryApk.data)
                    .digest('hex'),
                },
              },
            };

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'android-latest.json',
              data: Buffer.from(JSON.stringify(manifest, null, 2)),
              headers: {
                'content-type': 'application/json',
              },
            });
